name: Provision Infrastructure

on:
  workflow_dispatch:

concurrency:
  group: pythonnorte-bubble-ratings-terraform-state # shared with destroy.yml, same state
  cancel-in-progress: false # never cancel an in-flight apply

permissions: {}

env:
  TF_VERSION: "1.15.7"
  AWS_REGION: "us-east-1"

jobs:
  provision:
    name: Terraform apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC federation to AWS

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive -diff

      - uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf  # v12.1347.0
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: "CKV_TF_1,CKV2_AWS_34,CKV_AWS_111,CKV_AWS_356"

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Summary
        run: |
          {
            echo "### Provisioned"
            echo "| | Value |"
            echo "|---|---|"
            echo "| Frontend URL | $(terraform output -raw frontend_url) |"
            echo "| HTTP API URL | $(terraform output -raw http_api_url) |"
            echo "| WebSocket API URL | $(terraform output -raw ws_api_url) |"
            echo ""
            echo "Resource identifiers were published to SSM Parameter Store under"
            echo "\`/pythonnorte-bubble-ratings/*\`, and the **pythonnorte-bubble-ratings-app**"
            echo "repo's CD workflow reads them automatically, no manual copy needed."
            echo "Just make sure \`AWS_APP_DEPLOY_ROLE_ARN\` is configured as a secret"
            echo "there, scoped to read that SSM path and deploy to these resources."
          } >> "$GITHUB_STEP_SUMMARY"
